<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 108 108" width="108" height="108">
  <title>スマートグラス検出 アイコン</title>
  <desc>
    スマートグラスのシルエット（フロントビュー）と
    右レンズ上の検出波アーク3本で構成。
    背景：#E65100（オレンジ）、前景：白
    セーフゾーン: 18,18 〜 90,90
  </desc>

  <!-- ── 背景 ─────────────────────────────── -->
  <rect width="108" height="108" fill="#E65100"/>

  <!-- ── 検出波（右レンズ上、中心 x=70, y=55 からの半円アーク）
       r=5  : M65,55  A 5, 5 0 0,1  75,55   頂点 y=50
       r=9  : M61,55  A 9, 9 0 0,1  79,55   頂点 y=46
       r=13 : M57,55  A13,13 0 0,1  83,55   頂点 y=42
       外側ほど細くすることで自然な減衰を表現
  ─── -->
  <path d="M65,55 A5,5 0 0,1 75,55"
        fill="none" stroke="white" stroke-width="3"
        stroke-linecap="round"/>
  <path d="M61,55 A9,9 0 0,1 79,55"
        fill="none" stroke="white" stroke-width="2.5"
        stroke-linecap="round"/>
  <path d="M57,55 A13,13 0 0,1 83,55"
        fill="none" stroke="white" stroke-width="2"
        stroke-linecap="round"/>

  <!-- ── スマートグラス本体 ──────────────────
       左レンズ : rect(22, 57, 24, 17, rx=6)
       右レンズ : rect(58, 57, 24, 17, rx=6)
       ブリッジ : (46,65) → (58,65)
       左テンプル: (22,65) → (18,69)
       右テンプル: (82,65) → (90,69)
  ─── -->

  <!-- 左レンズ -->
  <rect x="22" y="57" width="24" height="17" rx="6"
        fill="none" stroke="white" stroke-width="3.5"
        stroke-linejoin="round"/>

  <!-- 右レンズ -->
  <rect x="58" y="57" width="24" height="17" rx="6"
        fill="none" stroke="white" stroke-width="3.5"
        stroke-linejoin="round"/>

  <!-- ブリッジ（左右レンズを繋ぐ） -->
  <line x1="46" y1="65" x2="58" y2="65"
        stroke="white" stroke-width="3.5"
        stroke-linecap="round"/>

  <!-- 左テンプル -->
  <line x1="22" y1="65" x2="18" y2="69"
        stroke="white" stroke-width="3.5"
        stroke-linecap="round"/>

  <!-- 右テンプル -->
  <line x1="82" y1="65" x2="90" y2="69"
        stroke="white" stroke-width="3.5"
        stroke-linecap="round"/>

</svg>
