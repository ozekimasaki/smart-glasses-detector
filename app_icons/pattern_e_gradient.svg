<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgE" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8A65"/>
      <stop offset="50%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="atop"/>
    </filter>
  </defs>

  <!-- ��������o -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgE)"/>

  <!-- ����o�����	 -->
  <circle cx="380" cy="120" r="100" fill="#FFFFFF" opacity="0.05"/>
  <circle cx="130" cy="400" r="80" fill="#FFFFFF" opacity="0.04"/>

  <!-- ����n���� -->
  <g filter="url(#shadow)">
    <!-- ��,S -->
    <g transform="translate(256,265)">
      <!-- ���W�B�	 -->
      <rect x="-125" y="-40" width="110" height="80" rx="26" ry="26"
            fill="#FFFFFF" fill-opacity="0.15" stroke="url(#glassGrad)" stroke-width="12"/>
      <!-- ���W�B�	 -->
      <rect x="15" y="-40" width="110" height="80" rx="26" ry="26"
            fill="#FFFFFF" fill-opacity="0.15" stroke="url(#glassGrad)" stroke-width="12"/>
      <!-- ��ø -->
      <path d="M-15,-5 C-5,-22 5,-22 15,-5" fill="none" stroke="url(#glassGrad)" stroke-width="10" stroke-linecap="round"/>
      <!-- ���� -->
      <path d="M-125,0 L-162,26" stroke="url(#glassGrad)" stroke-width="10" stroke-linecap="round" fill="none"/>
      <path d="M125,0 L162,26" stroke="url(#glassGrad)" stroke-width="10" stroke-linecap="round" fill="none"/>

      <!-- ��nϤ�� -->
      <ellipse cx="-55" cy="-15" rx="25" ry="12" fill="#FFFFFF" opacity="0.08" transform="rotate(-15,-55,-15)"/>
      <ellipse cx="85" cy="-15" rx="25" ry="12" fill="#FFFFFF" opacity="0.08" transform="rotate(-15,85,-15)"/>
    </g>
  </g>

  <!-- BLE��
knKvX	 -->
  <g transform="translate(320,155)">
    <circle cx="0" cy="0" r="5" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.7">
      <animate attributeName="r" values="16;22;16" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.4">
      <animate attributeName="r" values="30;38;30" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.15;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="46" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.2">
      <animate attributeName="r" values="46;56;46" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.05;0.2" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Bluetooth ����
kU�RjO	 -->
  <g transform="translate(170,160) scale(0.7)" opacity="0.5">
    <path d="M0,-30 L20,0 L0,30 M0,-30 L-15,-15 M0,30 L-15,15"
          fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
